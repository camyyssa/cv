profile:
  name: Camelia Smeria
  label: Desarrolladora Web Full Stack
  email: camelia.smeria@gmail.com
  summary: Creo en aportar valor a las vidas de quienes me rodean. A nivel
    profesional, esto se traduce en crear software accesible adaptado a las
    necesidades del usuario. Pero por encima de todo, significa esforzarme por
    convertirme en la mejor programadora y persona que puedo ser.


    La pasión por todo lo lógico ha sido la fuerza que me acercó a la
    informática desde que me topé con mis primeras líneas de código en el
    ordenador de mi hermano mayor. Pequeños bloques de construcción, con algo
    de lógica aplicada, ensamblados de cierta manera, y las cosas se mueven tal
    y como las imaginas. Dedícale suficiente tiempo y la diversión nunca
    termina.


    Avanzando hasta hoy, con un máster y experiencia en la industria, la
    alegría de hacer que las cosas funcionen no ha terminado. Es más, me
    desafía cada día a esforzarme más, encontrar mejores soluciones y aprender
    cosas nuevas constantemente.


    Me apasiona convertir problemas complejos en soluciones simples y
    accesibles.


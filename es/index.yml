    from: Enero 2025
    summary: Jaapi es una plataforma de merchandising bajo demanda que permite a las empresas distribuir productos de marca a equipos remotos y globales a través de una red de centros de distribución en todo el mundo, produciendo artículos localmente sin mínimos y sin almacenamiento.
    highlights:
      - summary: Desarrollo full-stack de la plataforma de merchandising.
        keywords:
          - React
          - TypeScript
          - Node
      - summary: Uso extensivo de herramientas de IA para facilitar y semi-automatizar las actividades empresariales del día a día.


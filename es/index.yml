    summary: Proposales está creando el nuevo estándar para las propuestas comerciales. Creemos que redactar propuestas atractivas, con buen aspecto en escritorio y móvil y adaptadas al mundo moderno, debería ser fácil y rápido.
    highlights:
      - summary: Modernización y mantenimiento de la solución full-stack para el sitio web y la aplicación web.
        keywords:
          - React
          - JavaScript
          - GraphQL
          - Node
      - summary: Enfoque en la comunicación del equipo
      - summary: Formas de hacer prosperar un equipo de desarrollo remoto
      - summary: "Funcionalidad principal: envío de propuestas a múltiples destinatarios, utilizada en producción por un gran número de propuestas"

  - company: Magine AB Sweden
